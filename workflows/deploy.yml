      - name: Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          # Usa secreto para el usuario (crea secret VPS_USER en GitHub)
          username: ${{ secrets.VPS_USER }}
          # Pega la clave privada completa en el secret VPS_KEY (incluye BEGIN/END)
          key: ${{ secrets.VPS_KEY }}
          port: 22