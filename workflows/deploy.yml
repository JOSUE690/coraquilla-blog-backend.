- name: Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          port: 22
          # Esta línea es la clave para que no intente buscar un archivo:
          key_path: ""
          # Añadimos esto por si acaso el servidor requiere el tipo de llave explícito:
          fingerprint: ""
          script: |
            echo 'Conexion exitosa'